name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
      - run: go mod verify
      - name: Check formatting
        shell: bash
        run: |
          files="$(gofmt -l .)"
          test -z "$files" || { printf '%s\n' "$files"; exit 1; }
      - run: go vet ./...
      - run: go test ./...

  race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
      - run: go test -race -shuffle=on -count=3 ./...

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
      - name: Require full statement coverage
        shell: bash
        run: |
          for package in ./document ./document/coordinate ./document/save ./document/store ./document/virtual ./recovery; do
            profile="$(mktemp)"
            go test -coverprofile="$profile" "$package"
            total="$(go tool cover -func="$profile" | awk '/^total:/ { print $3 }')"
            rm -f "$profile"
            test "$total" = "100.0%" || { echo "$package coverage is $total"; exit 1; }
          done

  fuzz-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
      - run: go test ./document/store -run=^$ -fuzz=FuzzTreeMatchesReference -fuzztime=10s
      - run: go test ./document/store -run=^$ -fuzz=FuzzTreeConcurrentReadDuringEdits -fuzztime=10s
      - run: go test ./document/store -run=^$ -fuzz=FuzzTreeCompactionPreservesSnapshots -fuzztime=10s
      - run: go test ./document/store -run=^$ -fuzz=FuzzTreeAutoCompactionMatchesReference -fuzztime=10s
      - run: go test ./recovery -run=^$ -fuzz=FuzzJournalDecoders -fuzztime=10s
      - run: go test ./recovery -run=^$ -fuzz=FuzzJournalStateMachine -fuzztime=10s
      - run: go test ./recovery -run=^$ -fuzz=FuzzJournalBatchOperationsDecode -fuzztime=10s
      - run: go test ./recovery -run=^$ -fuzz=FuzzJournalReplayResilience -fuzztime=10s
      - run: go test ./document -run=^$ -fuzz=FuzzSessionStateMachine -fuzztime=10s
      - run: go test ./document -run=^$ -fuzz=FuzzSessionConcurrentSaveEdit -fuzztime=10s
      - run: go test ./document -run=^$ -fuzz=FuzzSessionCrashRecovery -fuzztime=10s
      - run: go test ./document -run=^$ -fuzz=FuzzSessionJournalQuotaIsAtomic -fuzztime=10s
      - run: go test ./document -run=^$ -fuzz=FuzzUTF8ReplacementBoundaries -fuzztime=10s
      - run: go test ./document -run=^$ -fuzz=FuzzEventHubStateMachine -fuzztime=10s
      - run: go test ./document -run=^$ -fuzz=FuzzChangeHistoryStateMachine -fuzztime=10s
      - run: go test ./document -run=^$ -fuzz=FuzzVirtualPagerSessionLifecycle -fuzztime=10s
      - run: go test ./document/coordinate -run=^$ -fuzz=FuzzIndexMatchesUTF8Reference -fuzztime=10s
      - run: go test ./document/coordinate -run=^$ -fuzz=FuzzChangeMapBoundsAndComposition -fuzztime=10s
      - run: go test ./document/coordinate -run=^$ -fuzz=FuzzIncrementalIndexMatchesFullBuild -fuzztime=10s
      - run: go test ./document/virtual -run=^$ -fuzz=FuzzLogicalPagePartition -fuzztime=10s
      - run: go test ./document/virtual -run=^$ -fuzz=FuzzLogicalPagesPreserveUTF8 -fuzztime=10s
      - run: go test ./document/virtual -run=^$ -fuzz=FuzzFragmentWindowsRespectRanges -fuzztime=10s
      - run: go test ./document/virtual -run=^$ -fuzz=FuzzPagerGenerationStateMachine -fuzztime=10s
